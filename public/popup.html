<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Twitter Likes Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #0f1117;
      color: #e7e9ea;
      width: 400px;
      min-height: 200px;
      max-height: 600px;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid #2f3336;
    }
    header h1 { font-size: 15px; font-weight: 700; flex: 1; }
    #status   { font-size: 11px; color: #71767b; }
    #progress { font-size: 11px; color: #1d9bf0; min-width: 90px; text-align: right; }

    /* ── Scan button ── */
    #scan-btn {
      padding: 6px 16px;
      border-radius: 20px;
      border: none;
      background: #1d9bf0;
      color: #fff;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    #scan-btn:hover    { background: #1a8cd8; }
    #scan-btn.scanning { background: #f4212e; }
    #scan-btn.scanning:hover { background: #d81e2b; }

    #clear-btn {
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid #2f3336;
      background: transparent;
      color: #e7e9ea;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    #clear-btn:hover    { border-color: #f4212e; color: #f4212e; }
    #clear-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Filters ── */
    .filters {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      padding: 10px 14px;
      border-bottom: 1px solid #2f3336;
    }
    .filters input,
    .filters select {
      width: 100%;
      padding: 5px 8px;
      border-radius: 6px;
      border: 1px solid #2f3336;
      background: #1e2126;
      color: #e7e9ea;
      font-size: 12px;
    }
    .filters input:focus,
    .filters select:focus { outline: none; border-color: #1d9bf0; }
    .filters .full { grid-column: 1 / -1; }

    .filter-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .filter-row label { font-size: 11px; color: #71767b; white-space: nowrap; }

    /* ── Tweet list ── */
    #list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 14px;
      font-size: 11px;
      color: #71767b;
      border-bottom: 1px solid #2f3336;
    }

    #tweet-list {
      overflow-y: auto;
      flex: 1;
      padding: 8px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .tweet-card {
      border: 1px solid #2f3336;
      border-radius: 10px;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      transition: border-color 0.15s;
    }
    .tweet-card:hover { border-color: #536471; }

    .tweet-header {
      display: flex;
      align-items: baseline;
      gap: 5px;
      flex-wrap: wrap;
    }
    .display-name { font-weight: 700; font-size: 13px; }
    .username     { color: #71767b; font-size: 12px; }
    .verified     { color: #1d9bf0; font-size: 11px; }
    .date         { color: #71767b; font-size: 11px; margin-left: auto; }

    .tweet-text {
      font-size: 13px;
      line-height: 1.45;
      color: #e7e9ea;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .tweet-stats {
      display: flex;
      gap: 12px;
      font-size: 11px;
      color: #71767b;
    }

    .tweet-link {
      font-size: 11px;
      color: #1d9bf0;
      text-decoration: none;
      align-self: flex-start;
    }
    .tweet-link:hover { text-decoration: underline; }

    .empty {
      color: #71767b;
      text-align: center;
      padding: 30px 0;
    }
  </style>
</head>
<body>
  <header>
    <h1>Likes Manager</h1>
    <span id="status">Idle</span>
    <span id="progress"></span>
    <button id="clear-btn" title="Delete all stored tweets">Clear</button>
    <button id="scan-btn">Start Scan</button>
  </header>

  <div class="filters">
    <input id="query"  class="full" type="text" placeholder="Search text or name…" autocomplete="off" />
    <input id="author" type="text" placeholder="@username" autocomplete="off" />
    <select id="sort">
      <option value="newest">Newest first</option>
      <option value="oldest">Oldest first</option>
      <option value="likes">Most liked</option>
      <option value="author">By author</option>
    </select>
    <input id="date-from" type="date" title="From date" />
    <input id="date-to"   type="date" title="To date" />
    <div class="filter-row full">
      <input id="has-media" type="checkbox" />
      <label for="has-media">Only tweets with media</label>
    </div>
  </div>

  <div id="list-header">
    <span id="tweet-count">0 tweets</span>
  </div>

  <div id="tweet-list"></div>

  <script src="popup.js"></script>
</body>
</html>
